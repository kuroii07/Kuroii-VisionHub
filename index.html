<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VisionHub Studio</title>
    <script>
      window.__visionhubBootErrors = [];

      function escapeBootText(value) {
        return String(value).replace(/[<>&]/g, function (char) {
          return { '<': '&lt;', '>': '&gt;', '&': '&amp;' }[char];
        });
      }

      window.addEventListener('error', function (event) {
        window.__visionhubBootErrors.push(event.message || '未知脚本错误');
      });

      window.addEventListener('unhandledrejection', function (event) {
        window.__visionhubBootErrors.push(String(event.reason || '未处理的 Promise 错误'));
      });

      window.setTimeout(function () {
        var root = document.getElementById('root');
        if (!root || document.querySelector('.appShell')) return;
        if (root.textContent && root.textContent.includes('启动错误')) return;

        var errors = window.__visionhubBootErrors || [];
        if (!errors.length) {
          errors = ['React 应用没有在 3 秒内挂载。可能是模块脚本未执行、WebView 阻止了资源加载，或入口 JS 在非常早期失败。'];
        }

        root.innerHTML =
          '<div style="min-height:100vh;display:grid;place-items:center;background:#070a11;color:#f7f8fb;font-family:Inter,Segoe UI,Arial,sans-serif;padding:28px;">' +
          '<div style="width:min(860px,92vw);padding:30px;border:1px solid rgba(255,99,126,.35);border-radius:24px;background:rgba(36,16,24,.88);box-shadow:0 24px 80px rgba(0,0,0,.32);">' +
          '<div style="font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:#ffb2bf;margin-bottom:12px;">VisionHub Studio 启动错误</div>' +
          '<h1 style="margin:0 0 12px;font-size:28px;">脚本资源没有成功加载</h1>' +
          '<p style="line-height:1.7;color:rgba(247,248,251,.76);">应用没有完成前端挂载。下面是 WebView 启动诊断信息。</p>' +
          '<pre style="white-space:pre-wrap;word-break:break-word;margin-top:16px;padding:16px;border-radius:16px;background:rgba(0,0,0,.28);color:#fff;">' +
          errors.map(escapeBootText).join('\\n') +
          '</pre></div></div>';
      }, 3000);
    </script>
  </head>
  <body>
    <div id="root">
      <div style="min-height:100vh;display:grid;place-items:center;background:#070a11;color:#f7f8fb;font-family:Inter,Segoe UI,Arial,sans-serif;">
        <div style="width:min(720px,88vw);padding:36px;border:1px solid rgba(255,255,255,.14);border-radius:28px;background:rgba(16,22,36,.86);box-shadow:0 24px 80px rgba(0,0,0,.32);">
          <div style="font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:#8ee8ff;margin-bottom:12px;">VisionHub Studio</div>
          <h1 style="margin:0 0 12px;font-size:32px;">正在加载多平台 AI 生图工作台...</h1>
          <p style="margin:0;color:rgba(247,248,251,.68);line-height:1.7;">
            正在启动前端界面。如果长时间没有进入完整应用，本页会自动显示启动诊断信息。
          </p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
